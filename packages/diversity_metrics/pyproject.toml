[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "diversity-metrics"
version = "0.1.0"
description = "Vetted diversity, novelty, and concentration metrics graduated from the Originality Whitespace-2 empirical study."
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "numpy>=1.24",
    "scipy>=1.11",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "ruff",
    "mypy",
]

[tool.hatch.build.targets.wheel]
packages = ["src/diversity_metrics"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.mypy]
strict = true

[[tool.mypy.overrides]]
module = ["scipy.*"]
ignore_missing_imports = true
